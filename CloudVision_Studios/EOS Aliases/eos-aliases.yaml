- service: arista.studio.v1.StudioConfigService
  method: Set
  body:
    value:
      key:
        studio_id: studio-eos-aliases
        workspace_id: ''
      display_name: EOS Aliases
      description: Configure EOS command aliases for device sets
      template:
        type: TEMPLATE_TYPE_MAKO
        body: |
          <%
            if not aliasDeviceSets:
              return
            devSetsCfg, devSetsCtx = aliasDeviceSets.resolveWithContext()
            if not devSetsCfg or not devSetsCfg.get('aliasConfig'):
              return
            aliasConfig = devSetsCfg['aliasConfig']
            aliases = aliasConfig.get('aliases', [])
            if not aliases:
              return
          %>
          % for a in aliases:
          <%
            aName = a.get('aliasName', '')
            aCommand = a.get('aliasCommand', '')
            if not aName or not aCommand:
              continue
          %>
          alias ${aName} ${aCommand}
          % endfor
      input_schema:
        fields:
          values:
            root:
              id: root
              type: INPUT_FIELD_TYPE_GROUP
              name: ''
              label: ''
              description: null
              required: null
              boolean_props: null
              integer_props: null
              float_props: null
              string_props: null
              group_props:
                members:
                  values:
                    - inputfield_aliasDeviceSets
              collection_props: null
              resolver_props: null
              auto_fill_action_id: null
              tag_matcher_props: null
            inputfield_aliasDeviceSets:
              id: inputfield_aliasDeviceSets
              type: INPUT_FIELD_TYPE_RESOLVER
              name: aliasDeviceSets
              label: Alias Device Sets
              description: Assign a set of EOS aliases to a group of devices.
              required: null
              boolean_props: null
              integer_props: null
              float_props: null
              string_props: null
              group_props: null
              collection_props: null
              resolver_props:
                base_field_id: inputfield_aliasConfig
                display_mode: RESOLVER_FIELD_DISPLAY_MODE_SPARSE
                input_mode: RESOLVER_FIELD_INPUT_MODE_MULTI_DEVICE_TAG
                input_tag_label: null
                tag_filter_query: null
              auto_fill_action_id: null
              tag_matcher_props: null
            inputfield_aliasConfig:
